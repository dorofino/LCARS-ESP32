; ============================================================
; LCARS-ESP32 — Star Trek LCARS UI Engine
; https://github.com/dorofino/lcars-esp32
;
; This platformio.ini builds the hello_lcars example.
; For library usage, add to your project's lib_deps:
;   lib_deps = https://github.com/dorofino/lcars-esp32.git
; ============================================================

[platformio]
src_dir = examples/hello_lcars/src

[env]
platform = espressif32@6.8.1
framework = arduino
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200

; Memory
board_build.arduino.memory_type = qio_opi
board_build.psram = enabled

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DDISABLE_ALL_LIBRARY_WARNINGS
    ;
    ; TFT_eSPI common
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DCGRAM_OFFSET
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_BACKLIGHT_ON=HIGH
    ;
    ; Font loading
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_GFXFF
    -DSMOOTH_FONT

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    symlink://${PROJECT_DIR}

; ============================================================
; LILYGO T-Display-S3 (170x320, 8-bit parallel)
; ============================================================
[env:tdisplays3]
board = lilygo-t-display-s3
board_build.partitions = default_16MB.csv

build_flags =
    ${env.build_flags}
    -DSCR_WIDTH=320
    -DSCR_HEIGHT=170
    ;
    ; TFT_eSPI parallel 8-bit
    -DINIT_SEQUENCE_3
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_PARALLEL_8_BIT

; ============================================================
; Waveshare ESP32-S3-LCD-1.47 (172x320, SPI)
; ============================================================
[env:waveshare147]
board = waveshare_esp32s3_lcd147

build_flags =
    ${env.build_flags}
    -DSCR_WIDTH=320
    -DSCR_HEIGHT=172
    ;
    ; TFT_eSPI SPI mode
    -DUSE_FSPI_PORT
    -DTFT_WIDTH=172
    -DTFT_HEIGHT=320
    -DTFT_MOSI=45
    -DTFT_SCLK=40
    -DTFT_CS=42
    -DTFT_DC=41
    -DTFT_RST=39
    -DTFT_BL=48
    -DTFT_MISO=-1
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=16000000
